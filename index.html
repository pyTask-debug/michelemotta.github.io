<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Michele's website</title>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Extra+Condensed:wght@600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Open Sans',sans-serif;overflow:hidden;background:#35e0e6;color:rgb(235,230,230)}

        /* INTRO */
        #introScreen{position:fixed;inset:0;background:#060606;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000;transition:opacity .5s,visibility .5s}
        #introScreen.hidden{opacity:0;visibility:hidden}
        #brainCanvas{position:absolute;inset:0;width:100%;height:100%;cursor:pointer}

        /* FIRMA SVG*/
        .signature-svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(3800px, 180vw);height:auto;z-index:1001;pointer-events:none;display:none}
        .signature-path{fill:none;stroke:#fff;stroke-width:.18;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:2000;stroke-dashoffset:2000;animation:drawSig 8s ease-out forwards}
        @keyframes drawSig{to{stroke-dashoffset:0}}
        .signature-svg.show{display:block}

        /* MAIN */
        #mainContent{display:none}
        #introScreen.hidden~#mainContent{display:block}
        #neuralCanvas{position:fixed;inset:0;width:100%;height:100%}

        .hover-label{position:fixed;background:rgba(8,8,8,.9);padding:8px 16px;border-radius:8px;border:2px solid;pointer-events:none;opacity:0;transition:opacity .2s;z-index:100;font-size:14px;font-weight:600}
        .hover-label.show{opacity:1}

        #backButton{position:fixed;top:20px;left:20px;background:rgba(102,126,234,.8);border:none;padding:10px 20px;border-radius:8px;color:#fff;cursor:pointer;font-weight:600;z-index:200;display:none;transition:background .3s}
        #backButton:hover{background:rgba(102,126,234,1)}

        #centralText{position:fixed;top:40px;right:60px;font-family:'Saira Extra Condensed',sans-serif;font-size:2rem;font-weight:600;color:rgba(207,237,244,.85);z-index:25;pointer-events:none;white-space:normal;opacity:1;transition:opacity .5s ease-out;text-align:right;max-width:300px}
        #centralText.hidden{opacity:0;pointer-events:none}

        #contentView{position:fixed;right:0;top:0;width:70%;height:100%;background:rgba(10,10,10,.95);padding:40px;display:none;z-index:50;overflow:auto}
        #contentView h2{margin-bottom:20px;font-size:2rem}
        #contentView iframe{border:none;border-radius:8px;background:#fff}

        @media(max-width:768px){
            #centralText{top:20px;right:20px;font-size:1rem;max-width:200px}
            .signature-svg{width:400vw;}
            #contentView{width:100%;padding:20px;padding-top:70px}
            #backButton{top:10px;left:10px;z-index:300}
        }

        @media(min-width:769px){
            .zone-line{position:fixed;background:rgba(255,255,255,0.5);pointer-events:none;z-index:1;}
        }
        #footerCredit{
            position:fixed;
            bottom:12px;
            left:50%;
            transform:translateX(-50%);
            font-family:'Saira Extra Condensed',sans-serif;
            font-size:0.85rem;
            color: rgba(184, 37, 9, 0.7);
            letter-spacing:0.08em;
            z-index:300;
            pointer-events:none;
            white-space:nowrap;
            transition:opacity .5s;
        }
        #footerCredit.hidden{opacity:0;}
    </style>
</head>
<body>

<div id="introScreen">
    <canvas id="brainCanvas"></canvas>

const brainCanvas = document.getElementById('brainCanvas');
const brainCtx = brainCanvas.getContext('2d');

function normalizeBrainShape(pts) {
    let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
    pts.forEach(p=>{mnX=Math.min(mnX,p.x);mxX=Math.max(mxX,p.x);mnY=Math.min(mnY,p.y);mxY=Math.max(mxY,p.y)});
    const w=mxX-mnX,h=mxY-mnY;
    return pts.map(p=>({x:(p.x-mnX)/w,y:(p.y-mnY)/h}));
}
const brainShape = normalizeBrainShape(brainShapeAbsolute);

let scaledPoints=[], brainAnimId=null;

function initBrainIntro(){
    brainCanvas.width=window.innerWidth;
    brainCanvas.height=window.innerHeight;
    const cx=brainCanvas.width/2,cy=brainCanvas.height/2;
    const scale=Math.min(brainCanvas.width,brainCanvas.height)*0.6;
    scaledPoints=brainShape.map(p=>({x:cx+(p.x-0.5)*scale,y:cy+(p.y-0.5)*scale}));

    drawBrainStatic();
}


let brainOffscreen=null;
function drawBrainStatic(){
    brainOffscreen=document.createElement('canvas');
    brainOffscreen.width=brainCanvas.width;
    brainOffscreen.height=brainCanvas.height;
    const ctx2=brainOffscreen.getContext('2d');
    ctx2.fillStyle='#060606';
    ctx2.fillRect(0,0,brainOffscreen.width,brainOffscreen.height);
    const pts=scaledPoints;
    const lw=isMobile?1.8:6;
    ctx2.strokeStyle='rgb(184,37,9)';
    ctx2.lineWidth=lw;
    ctx2.shadowBlur=isMobile?15:40;
    ctx2.shadowColor='rgba(184,37,9,0.8)';
    ctx2.beginPath();
    ctx2.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) ctx2.lineTo(pts[i].x,pts[i].y);
    ctx2.closePath();
    ctx2.stroke();
    ctx2.shadowBlur=0;
    // Copia sul canvas visibile
    brainCtx.drawImage(brainOffscreen,0,0);
}

    update(){
        if(!this.isDragging){
            if(this.isSpecial && this.zone){
                // Rimbalza dentro la zona
                const [x1,y1,x2,y2]=this.zone;
                const pad=this.radius+5;
                this.x+=this.vx;
                this.y+=this.vy;
                if(this.x<x1+pad){this.x=x1+pad;this.vx=Math.abs(this.vx);}
                if(this.x>x2-pad){this.x=x2-pad;this.vx=-Math.abs(this.vx);}
                if(this.y<y1+pad){this.y=y1+pad;this.vy=Math.abs(this.vy);}
                if(this.y>y2-pad){this.y=y2-pad;this.vy=-Math.abs(this.vy);}
            } else {
                const nx=this.x+this.vx,ny=this.y+this.vy;
                if(isPointInNetwork(nx,ny)){this.x=nx;this.y=ny;}
                else{this.vx*=-1;this.vy*=-1;}
            }
        }
        if(this.isSpecial){
            this.glowIntensity+=0.02*this.glowDirection;
            if(this.glowIntensity>=1||this.glowIntensity<=0) this.glowDirection*=-1;
        }
    }
    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        if(this.isSpecial){
            ctx.fillStyle=this.specialData.color;
            ctx.shadowBlur=20+this.glowIntensity*15;
            ctx.shadowColor=this.specialData.color;
            ctx.fill(); ctx.shadowBlur=0;
            ctx.beginPath();
            ctx.arc(this.x,this.y,this.radius+5+this.glowIntensity*3,0,Math.PI*2);
            ctx.strokeStyle=this.specialData.color+'80';
            ctx.lineWidth=2; ctx.stroke();
        } else {
            ctx.fillStyle='rgba(186,201,204,0.8)'; ctx.fill();
            ctx.strokeStyle='rgba(10,206,250,0.5)'; ctx.lineWidth=1; ctx.stroke();
        }
    }
    contains(x,y){const dx=this.x-x,dy=this.y-y;return Math.sqrt(dx*dx+dy*dy)<this.radius+10;}
}

class ElectricPulse{
    constructor(x1,y1,x2,y2){this.x1=x1;this.y1=y1;this.x2=x2;this.y2=y2;this.progress=0;this.speed=0.03;}
    update(){this.progress+=this.speed;return this.progress>=1;}
    draw(){
        const x=this.x1+(this.x2-this.x1)*this.progress;
        const y=this.y1+(this.y2-this.y1)*this.progress;
        ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
        ctx.fillStyle='#00ffff'; ctx.shadowBlur=15; ctx.shadowColor='#00ffff';
        ctx.fill(); ctx.shadowBlur=0;
    }
}

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    setupNetworkBounds();
}

function setupNetworkBounds(){
    let cx,cy,w,h;
    if(state.currentView==='home'){cx=canvas.width/2;cy=canvas.height/2;w=canvas.width;h=canvas.height;}
    else if(isMobile){cx=canvas.width/2;cy=canvas.height/2;w=canvas.width;h=canvas.height;}
    else{w=(canvas.width*CONFIG.networkSizeReduced)*0.80;h=canvas.height;cx=w/2;cy=h/2;}
    state.networkBounds={centerX:cx,centerY:cy,width:w,height:h,radius:Math.max(w,h)/2};
}

function isPointInNetwork(x,y){
    if(!state.networkBounds) return false;
    if(state.currentView==='home') return x>=0&&x<=canvas.width&&y>=0&&y<=canvas.height;
    const dx=x-state.networkBounds.centerX,dy=y-state.networkBounds.centerY;
    return Math.sqrt(dx*dx+dy*dy)<state.networkBounds.radius;
}

function getMousePos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}

function initNeurons(){
    state.neurons=[];
    // Rimuovi vecchie linee
    document.querySelectorAll('.zone-line').forEach(el=>el.remove());

    if(!isMobile){
        // Disegna le 4 zone come div
        const W=canvas.width, H=canvas.height;
        const midX=W*0.42, midY=H*0.58;  // asimmetrico

        // Linea verticale
        const vLine=document.createElement('div');
        vLine.className='zone-line';
        vLine.style.position='fixed';
        vLine.style.left=midX+'px';
        vLine.style.top='0';
        vLine.style.width='3px';
        vLine.style.height='100%';
        vLine.style.backgroundColor='rgba(255,255,255,0.5)';
        vLine.style.pointerEvents='none';
        vLine.style.zIndex='1';
        document.body.appendChild(vLine);

        // Linea orizzontale
        const hLine=document.createElement('div');
        hLine.className='zone-line';
        hLine.style.position='fixed';
        hLine.style.left='0';
        hLine.style.top=midY+'px';
        hLine.style.width='100%';
        hLine.style.height='3px';
        hLine.style.backgroundColor='rgba(255,255,255,0.5)';
        hLine.style.pointerEvents='none';
        hLine.style.zIndex='1';
        document.body.appendChild(hLine);

        // Zone: [xMin, yMin, xMax, yMax]
        const zones=[
            [0,      0,    midX, midY],  // top-left     → CV (verde)
            [midX,   0,    W,    midY],  // top-right     → Publications (rosa)
            [0,      midY, midX, H   ],  // bottom-left   → Contacts (viola)
            [midX,   midY, W,    H   ]   // bottom-right  → About (giallo)
        ];

        // Neuroni normali
        const n=CONFIG.neuronsHome;
        for(let i=0;i<n;i++) state.neurons.push(new Neuron(Math.random()*canvas.width,Math.random()*canvas.height));

        // Neuroni speciali, uno per zona
        CONFIG.specialNeurons.forEach((sp,i)=>{
            const [x1,y1,x2,y2]=zones[i];
            const x=x1+(x2-x1)/2, y=y1+(y2-y1)/2;
            const neu=new Neuron(x,y,true,sp);
            neu.zone=zones[i];
            sp.neuron=neu;
            state.neurons.push(neu);
        });
    } else {
        // Mobile: comportamento originale
        const n=CONFIG.neuronsReduced;
        for(let i=0;i<n;i++) state.neurons.push(new Neuron(Math.random()*canvas.width,Math.random()*canvas.height));
        const r=Math.min(canvas.width,canvas.height)*0.4;
        CONFIG.specialNeurons.forEach((sp,i)=>{
            const angle=(Math.PI*2*i)/CONFIG.specialNeurons.length;
            const x=state.networkBounds.centerX+r*Math.cos(angle);
            const y=state.networkBounds.centerY+r*Math.sin(angle);
            const neu=new Neuron(x,y,true,sp); sp.neuron=neu; state.neurons.push(neu);
        });
    }
}


function drawConnections(){
    const maxDist=state.isReduced?CONFIG.maxConnectionDistanceReduced:CONFIG.maxConnectionDistanceHome;
    const maxDist2=maxDist*maxDist;
    const ns=state.neurons;
    let dragCount=0;

    for(let i=0;i<ns.length;i++){
        for(let j=i+1;j<ns.length;j++){
            const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y;
            const d2=dx*dx+dy*dy;
            if(d2<maxDist2){
                const d=Math.sqrt(d2);
                const op=(1-d/maxDist)*0.5;
                ctx.beginPath();
                ctx.moveTo(ns[i].x,ns[i].y);
                ctx.lineTo(ns[j].x,ns[j].y);
                ctx.strokeStyle=`rgba(102,126,234,${op})`;
                ctx.lineWidth=1.5; ctx.stroke();
                if(Math.random()<CONFIG.pulseGenerationChance)
                    state.pulses.push(new ElectricPulse(ns[i].x,ns[i].y,ns[j].x,ns[j].y));

                // Conta connessioni del neurone trascinato
                if(state.draggedNeuron && (ns[i]===state.draggedNeuron || ns[j]===state.draggedNeuron)){
                    dragCount++;
                }
            }
        }
    }

    // Aggiorna il contatore
    const cc=document.getElementById('connectionCount');
    if(state.draggedNeuron && cc){
        cc.style.display='block';
        cc.style.left=(state.draggedNeuron.x+20)+'px';
        cc.style.top=(state.draggedNeuron.y-20)+'px';
        cc.textContent=dragCount+' connections';
    } else if(cc){
        cc.style.display='none';
    }
}

function animate(){
    ctx.fillStyle='#151569';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawConnections();
    state.pulses=state.pulses.filter(p=>{p.draw();return!p.update();});
    state.neurons.forEach(n=>{n.update();n.draw();});
    state.animationId=requestAnimationFrame(animate);
}

function openContentView(special){
    hoverLabel.classList.remove('show');
    if(state.isTransitioning) return;
    state.isTransitioning=true; state.currentView=special.id; state.isReduced=true;
    state.neurons.forEach(n => { if(n.isSpecial) n.zone = null; });
    document.querySelectorAll('.zone-line').forEach(el=>el.style.display='none');
    if(isMobile){state.isTransitioning=false;showContent(special);return;}
    const duration=CONFIG.transitionDuration,startTime=Date.now();
    const initialBounds={...state.networkBounds};
    const spObjs=state.neurons.filter(n=>n.isSpecial);
    const reg=state.neurons.filter(n=>!n.isSpecial);
    state.neurons=[...reg.slice(0,CONFIG.neuronsReduced),...spObjs];
    const tSize=(canvas.width*CONFIG.networkSizeReduced)*0.80;
    const tCX=(canvas.width*CONFIG.networkSizeReduced)/2,tCY=canvas.height/2,tR=tSize/2;
    const sR=tR/initialBounds.radius;
    state.neurons.forEach(n=>{
        n.initialX=n.x;n.initialY=n.y;
        n.targetX=tCX+(n.x-initialBounds.centerX)*sR;
        n.targetY=tCY+(n.y-initialBounds.centerY)*sR;
    });
    function animTrans(){
        const elapsed=Date.now()-startTime,progress=Math.min(elapsed/duration,1);
        const ep=1-Math.pow(1-progress,3);
        state.networkBounds.centerX=initialBounds.centerX+(tCX-initialBounds.centerX)*ep;
        state.networkBounds.centerY=initialBounds.centerY+(tCY-initialBounds.centerY)*ep;
        state.networkBounds.radius=initialBounds.radius+(tR-initialBounds.radius)*ep;
        state.neurons.forEach(n=>{n.x=n.initialX+(n.targetX-n.initialX)*ep;n.y=n.initialY+(n.targetY-n.initialY)*ep;});
        if(progress<1){requestAnimationFrame(animTrans);}
        else{
            state.networkBounds.centerX=tCX;state.networkBounds.centerY=tCY;state.networkBounds.radius=tR;
            state.neurons.forEach(n=>{n.x=n.targetX;n.y=n.targetY;delete n.initialX;delete n.initialY;delete n.targetX;delete n.targetY;});
            state.isTransitioning=false; showContent(special);
        }
    }
    animTrans();
}

function showContent(special) {
    document.getElementById('footerCredit').classList.add('hidden');
    centralText.classList.add('hidden');
    contentView.style.display = 'block';
    const isPDF = special.url.endsWith('.pdf');

    if (isMobile) {
        backButton.style.display = 'none';

        if (isPDF) {
            contentView.innerHTML = `
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
                    <button onclick="closeContentView()" style="background:${special.color};border:none;padding:10px 20px;border-radius:8px;color:#fff;cursor:pointer;font-weight:600;font-family:'Open Sans',sans-serif;flex-shrink:0;">Back</button>
                    <h2 style="color:${special.color};font-weight:bold;margin:0;">${special.label}</h2>
                   <button onclick="downloadPDF('${special.url}', 'cv.pdf')" style="margin-left:auto;background:${special.color};border:none;padding:10px 16px;border-radius:8px;color:#fff;cursor:pointer;font-weight:600;font-family:'Open Sans',sans-serif;">⬇ Download</button>
                </div>
                <div id="pdfContainer" style="width:100%;overflow-y:auto;"></div>
            `;
            renderPDFMobile(special.url);
        } else {
            contentView.innerHTML = `
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
                    <button onclick="closeContentView()" style="background:${special.color};border:none;padding:10px 20px;border-radius:8px;color:#fff;cursor:pointer;font-weight:600;font-family:'Open Sans',sans-serif;flex-shrink:0;">Back</button>
                    <h2 style="color:${special.color};font-weight:bold;margin:0;">${special.label}</h2>
                </div>
                <iframe src="${special.url}" width="100%" style="height:calc(100vh - 120px);border:none;border-radius:8px;background:#fff;"></iframe>
            `;
        }
    } else {
        backButton.style.display = 'block';
        backButton.style.background = special.color;
        backButton.style.boxShadow = `0 0 15px ${special.color}80`;
        backButton.style.border = `2px solid ${special.color}`;
        contentView.innerHTML = `
            <h2 style="color:${special.color};font-weight:bold;">${special.label}</h2>
            <iframe src="${special.url}" width="100%" height="90%"></iframe>
        `;
    }
}

function renderPDFMobile(url) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    script.onload = async () => {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const container = document.getElementById('pdfContainer');
        if (!container) return;

        try {
            const loadingTask = pdfjsLib.getDocument(url);
            const pdf = await loadingTask.promise;
            const dpr = window.devicePixelRatio || 2;

            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                const baseViewport = page.getViewport({ scale: 1 });
                const scale = (window.innerWidth / baseViewport.width) * dpr;
                const viewport = page.getViewport({ scale });

                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                canvas.style.width = '100%';
                canvas.style.display = 'block';
                canvas.style.marginBottom = '8px';
                canvas.style.borderRadius = '8px';
                container.appendChild(canvas);

                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            }
        } catch (e) {
            container.innerHTML = `<p style="color:#fff;padding:20px;">Errore. <a href="${url}" style="color:#0AF023;">Apri PDF</a></p>`;
        }
    };
    document.head.appendChild(script);
}

function downloadPDF(url, filename) {
    fetch(url)
        .then(r => r.blob())
        .then(blob => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename || 'document.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        })
        .catch(() => window.open(url, '_blank'));
}
function closeContentView(){
    document.getElementById('footerCredit').classList.remove('hidden');
    state.currentView='home';state.isReduced=false;
    backButton.style.display='none';backButton.style.background='rgba(102,126,234,0.8)';
    backButton.style.boxShadow='none';backButton.style.border='none';
    contentView.style.display='none';centralText.classList.remove('hidden');
    document.querySelectorAll('.zone-line').forEach(el=>el.style.display='block');
    resizeCanvas();initNeurons();
}

canvas.addEventListener('mousemove',e=>{
    const pos=getMousePos(e);
    if(state.draggedNeuron&&!state.draggedNeuron.isSpecial){state.draggedNeuron.x=pos.x;state.draggedNeuron.y=pos.y;}
    state.hoveredSpecialNeuron=null;
    CONFIG.specialNeurons.forEach(sp=>{if(sp.neuron&&sp.neuron.contains(pos.x,pos.y)) state.hoveredSpecialNeuron=sp;});
    if(state.hoveredSpecialNeuron){
        hoverLabel.textContent=state.hoveredSpecialNeuron.label;
        hoverLabel.style.borderColor=state.hoveredSpecialNeuron.color;
        hoverLabel.style.left=(e.clientX+15)+'px';
        hoverLabel.style.top=(e.clientY-35)+'px';
        hoverLabel.classList.add('show'); canvas.style.cursor='pointer';
    } else {hoverLabel.classList.remove('show');canvas.style.cursor=state.draggedNeuron?'grabbing':'default';}
});
canvas.addEventListener('mousedown',e=>{
    const pos=getMousePos(e);
    let cs=false;
    CONFIG.specialNeurons.forEach(sp=>{if(sp.neuron&&sp.neuron.contains(pos.x,pos.y)) cs=true;});
    if(!cs){
        for(const n of state.neurons){
            if(!n.isSpecial&&n.contains(pos.x,pos.y)){state.draggedNeuron=n;n.isDragging=true;canvas.style.cursor='grabbing';break;}
        }
    }
});
canvas.addEventListener('mouseup',()=>{
    if(state.draggedNeuron){
        state.draggedNeuron.isDragging=false;
        if(!isPointInNetwork(state.draggedNeuron.x,state.draggedNeuron.y)&&state.networkBounds){
            state.draggedNeuron.x=state.networkBounds.centerX;state.draggedNeuron.y=state.networkBounds.centerY;
        }
        state.draggedNeuron=null;canvas.style.cursor='default';
    }
});
canvas.addEventListener('click',()=>{if(state.hoveredSpecialNeuron&&!state.isTransitioning) openContentView(state.hoveredSpecialNeuron);});
backButton.addEventListener('click',closeContentView);
window.addEventListener('resize',()=>{
    if(document.getElementById('introScreen').classList.contains('hidden')){resizeCanvas();initNeurons();}
    else{initBrainIntro();}
});
    canvas.addEventListener('touchstart', e => {
e.preventDefault();
const t = e.touches[0];
const r = canvas.getBoundingClientRect();
const pos = { x: t.clientX - r.left, y: t.clientY - r.top };
CONFIG.specialNeurons.forEach(sp => {
    if (sp.neuron && sp.neuron.contains(pos.x, pos.y)) {
        state.hoveredSpecialNeuron = sp;
    }
});
}, { passive: false });

canvas.addEventListener('touchend', e => {
e.preventDefault();
hoverLabel.classList.remove('show'); // nasconde subito il tooltip
if (state.hoveredSpecialNeuron && !state.isTransitioning) {
    openContentView(state.hoveredSpecialNeuron);
}
state.hoveredSpecialNeuron = null;
}, { passive: false });
</script>
